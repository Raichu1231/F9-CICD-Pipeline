name: CICD - Pipeline Repository Test

on:
    push: 
        branches: [ "main" ]
    pull_request:
        branches: [ "main" ]

jobs: 
  build-and-test:
    runs-on: ubuntu-latest
    
    steps: 
      - name: Check Code 
      uses: actions/checkout@v3
      
      name: Set up Python
      uses: actions/setup-python@v5
      with: 
        python-version: '3.11'

      name: Verfiy App Code 
      run: |
        echo "Verifying local repository files... "
        python app.py 
        python -m compileall .
