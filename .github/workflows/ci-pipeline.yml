name: CICD - Pipeline Repository Test

on:
    push: 
        branches: [ "main" ]

jobs: 
  continuous-integration:
    runs-on: ubuntu-latest
    
    steps: 
      - name: Fetch Codebase 
        uses: actions/checkout@v4
      
      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with: 
          python-version: '3.11'

      - name: Execute Code Syntax Integrity Check 
        run: | 
          python -m py_compile app.py

  continuous-development: 
    runs-on: ubuntu-latest
    needs: continuous-integration 

    steps: 
      - name: Fetch Codebase
        uses: actions/checkout@v4

      - name: Deploy working to Amaon Linux 2023 via SSH 
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "app.py"
          target: "/home/ec2-user/backend-app/"

      - name: Restart Backend Application Services
        uses: appleboy/scp-action@master 
        with: 
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ec2-user 
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl restart backend-app.service 